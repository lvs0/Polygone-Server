[package]
name = "polygone-server"
version = "0.1.0"
edition = "2021"
authors = ["Lévy <contact@soe-ai.dev>"]

[dependencies]
polygone-core = { git = "https://github.com/lvs0/Polygone.git", branch = "main" }
tokio = { version = "1", features = ["full"] }
anyhow = "1"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
clap = { version = "4", features = ["derive"] }
base64 = "0.22"
libp2p = { version = "0.53", features = ["tokio", "tcp", "noise", "yamux", "kad", "identify", "macros"] }

[profile.release]
opt-level = "z"        # Optimize for size
codegen-units = 1      # Reduce parallel compilation RAM
lto = "fat"            # Full Link Time Optimization (smaller binary)
panic = "abort"        # Reduce binary overhead
strip = true           # Remove symbols from binary
